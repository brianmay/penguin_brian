{% extends "base.html" %} {% block content %}
<h1>{{ section.title }}</h1>
<!-- If you are using pagination, section.pages will be empty.
     You need to use the paginator object -->
<table class="list">
    <tbody>
        {% for person in section.pages %}
        <tr>
            <td data-label="Name"><a href="{{ person.permalink | safe }}">{{ person.title }}</a></td>
            <td data-label="Relationship">{{person.extra.relationship}}</td>
            <td data-label="Born">{{person.extra.born}}</td>
            <td data-label="Died">{{person.extra.died}}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock content %}
